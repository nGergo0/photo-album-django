services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=photo_album
      - POSTGRES_USER=photo-album
      - POSTGRES_PASSWORD=secret
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-photo_album}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./webapp:/app
      - media_data:/app/media
    environment:
      - DEBUG=1
      - DB_ENGINE=postgres
      - DB_NAME=photo_album
      - DB_USER=photo-album
      - DB_PASSWORD=secret
      - DB_HOST=postgres
      - DB_PORT=5432


volumes:
  media_data:
  db_data:
