{% extends 'base.html' %}

{% block title %}Delete Photo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle"></i> Confirm Delete
            </div>
            <div class="card-body text-center">
                <p class="fs-5">Are you sure you want to delete <strong>{{ photo.name }}</strong>?</p>
                <img src="{{ photo.photo.url }}" alt="{{ photo.name }}"
                     class="img-thumbnail mb-3" style="max-height:200px; object-fit:cover;">
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Yes, Delete
                        </button>
                        <a href="{% url 'photo_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
